name: Update A-share recommendations

on:
  workflow_dispatch:
  schedule:
    - cron: "31 1 * * 1-5"
    - cron: "46 1 * * 1-5"
    - cron: "1 2 * * 1-5"
    - cron: "20 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-a-share-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate latest recommendations
        run: python -u scripts/update_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/board_history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update daily A-share recommendations"
            git push
          fi
